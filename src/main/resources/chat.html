<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--aurora-bg, #ffffff);
            color: var(--aurora-fg, #3c3f41);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--aurora-border, #dfe1e5);
            background-color: var(--aurora-bg, #ffffff);
        }

        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: var(--aurora-fg, #3c3f41);
        }

        /* Chat messages area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background-color: var(--aurora-bg, #ffffff);
        }

        .message {
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .message-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--aurora-assistant-header, #7a7d80);
            margin-bottom: 4px;
        }

        .message.user .message-header {
            color: var(--aurora-user-accent, #64b5f6);
        }

        /* Message content — supports markdown-like rendering */
        .message-content {
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* Markdown-style elements inside message content */
        .message-content code {
            font-family: var(--aurora-code-font, 'Consolas', 'Monaco', monospace);
            color: var(--aurora-pre-fg, #c7254e);
            background-color: var(--aurora-pre-bg, #f6f8fa);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.9em;
        }

        .message-content pre {
            margin: 8px 0;
            padding: 12px;
            background-color: var(--aurora-code-bg, #f6f8fa);
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.4;
        }

        .message-content pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            color: var(--aurora-code-fg, #24292f);
            font-size: inherit;
        }

        .message-content blockquote {
            margin: 8px 0;
            padding: 4px 12px;
            border-left: 3px solid var(--aurora-border, #dfe1e5);
            color: var(--aurora-assistant-header, #7a7d80);
        }

        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message-content li {
            margin-bottom: 4px;
        }

        .message-content a {
            color: var(--aurora-link-fg, #0969da);
            text-decoration: none;
        }

        .message-content a:hover {
            text-decoration: underline;
        }

        /* User message styling */
        .message.user .message-content {
            background-color: rgba(100, 181, 246, 0.08);
            padding: 8px 12px;
            border-radius: 6px;
        }

        /* Input area */
        .input-container {
            padding: 12px 16px;
            border-top: 1px solid var(--aurora-border, #dfe1e5);
            background-color: var(--aurora-bg, #ffffff);
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background-color: var(--aurora-input-bg, #f6f7f8);
            color: var(--aurora-input-fg, #3c3f41);
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }

        #messageInput:focus {
            background-color: var(--aurora-bg, #ffffff);
            box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.3);
        }

        #sendButton {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background-color: var(--aurora-send-bg, #0969da);
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #sendButton:hover {
            background-color: var(--aurora-send-hover, #0550ae);
        }

        #sendButton:disabled {
            background-color: var(--aurora-border, #b0b3b6);
            cursor: not-allowed;
        }

        /* Status bar */
        .status-bar {
            padding: 4px 16px;
            font-size: 11px;
            color: var(--aurora-status-fg, #7a7d80);
            background-color: var(--aurora-status-bg, #ffffff);
            border-top: 1px solid var(--aurora-border, #f0f1f2);
        }

        /* Scrollbar styling */
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background-color: var(--aurora-scrollbar-thumb, #dfe1e5);
            border-radius: 4px;
        }

        .chat-container::-webkit-scrollbar-thumb:hover {
            background-color: var(--aurora-scrollbar-thumb-hover, #b0b3b6);
        }

        /* Welcome message */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--aurora-welcome-fg, #7a7d80);
        }

        .welcome-message h2 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--aurora-fg, #3c3f41);
        }

        .welcome-message p {
            font-size: 13px;
        }

        /* Streaming cursor */
        .streaming-cursor::after {
            content: '▋';
            animation: blink 1s infinite;
            color: var(--aurora-cursor-color, #0969da);
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Selection styling */
        ::selection {
            background-color: var(--aurora-selection-bg, #0969da);
            color: var(--aurora-selection-fg, #ffffff);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Aurora AI Assistant</h1>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome-message">
            <h2>Welcome to Aurora!</h2>
            <p>I'm your AI coding assistant. How can I help you today?</p>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Ask Aurora anything..." autocomplete="off">
            <button id="sendButton">Send</button>
        </div>
    </div>

    <div class="status-bar" id="statusBar">Ready</div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusBar = document.getElementById('statusBar');

        let isProcessing = false;

        // Send message to Java backend via JCEF bridge
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;

            // Add user message to chat UI immediately
            addMessage('user', text);

            // Clear input
            messageInput.value = '';

            // Send to Java backend via JCEF bridge
            window.Aurora.postMessage(JSON.stringify({
                type: 'message',
                content: text
            }));
        }

        // Add message to chat UI
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const headerDiv = document.createElement('div');
            headerDiv.className = 'message-header';
            headerDiv.textContent = role === 'user' ? '> You' : 'Aurora';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Render markdown-like content (code blocks, inline code, etc.)
            contentDiv.innerHTML = renderMarkdown(content);

            messageDiv.appendChild(headerDiv);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        /**
         * Simple markdown-like renderer for code blocks and inline formatting.
         * Handles: ```code``` blocks, `inline code`, **bold**, *italic*, - lists, > blockquotes
         */
        function renderMarkdown(text) {
            if (!text) return '';
            
            // Escape HTML first to prevent XSS
            let html = escapeHtml(text);
            
            // Code blocks: ```code```
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                return '<pre><code>' + code.trim() + '</code></pre>';
            });
            
            // Inline code: `code`
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Bold: **text** or __text__
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            
            // Italic: *text* or _text_
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
            
            // Blockquotes: > text
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // Unordered lists: - item or * item
            html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, function(match) {
                return '<ul>' + match + '</ul>';
            });
            
            // Line breaks (preserve newlines as <br>)
            html = html.replace(/\n/g, '<br>');
            
            return html;
        }

        /**
         * Escape HTML special characters to prevent XSS.
         */
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Add streaming message placeholder
        function addStreamingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'streaming-message';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'message-header';
            headerDiv.textContent = 'Aurora';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content streaming-cursor';
            contentDiv.id = 'streaming-content';

            messageDiv.appendChild(headerDiv);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Update streaming message content
        function updateStreamingContent(content) {
            const contentDiv = document.getElementById('streaming-content');
            if (contentDiv) {
                contentDiv.innerHTML = renderMarkdown(content);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // Remove streaming cursor from message
        function removeStreamingCursor() {
            const contentDiv = document.getElementById('streaming-content');
            if (contentDiv) {
                contentDiv.classList.remove('streaming-cursor');
            }
        }

        /**
         * Handle theme changes from Java backend.
         * Applies CSS variables to the root element for dark/light theming.
         */
        window.Aurora.onThemeChange = function(cssVars, isDark) {
            const root = document.documentElement;
            
            // Apply each CSS variable
            for (const [key, value] of Object.entries(cssVars)) {
                root.style.setProperty(key, value);
            }
            
            console.log('Theme applied:', isDark ? 'dark' : 'light');
        };

        // Handle messages from Java backend via Aurora bridge callback
        window.Aurora.onMessage = function(jsonStr) {
            try {
                const data = JSON.parse(jsonStr);

                switch (data.type) {
                    case 'response':
                        removeStreamingCursor();
                        addMessage('assistant', data.content);
                        isProcessing = false;
                        sendButton.disabled = false;
                        statusBar.textContent = 'Ready';
                        messageInput.focus();
                        break;

                    case 'token':
                        // Incremental token update — append to streaming message content
                        if (isProcessing) {
                            const existingContent = document.getElementById('streaming-content');
                            if (existingContent) {
                                // Accumulate raw text for markdown rendering
                                let currentText = existingContent.textContent || '';
                                currentText += data.content;
                                updateStreamingContent(currentText);
                            }
                        }
                        break;

                    case 'error':
                        addMessage('assistant', 'Error: ' + data.message);
                        isProcessing = false;
                        sendButton.disabled = false;
                        statusBar.textContent = 'Ready';
                        messageInput.focus();
                        break;

                    case 'status':
                        statusBar.textContent = data.content;
                        if (data.content.includes('thinking')) {
                            isProcessing = true;
                            sendButton.disabled = true;
                            addStreamingMessage();
                        } else {
                            isProcessing = false;
                            sendButton.disabled = false;
                            removeStreamingCursor();
                        }
                        break;

                    case 'clear':
                        chatContainer.innerHTML = '';
                        addWelcomeMessage();
                        messageInput.focus();
                        break;
                }
            } catch (e) {
                console.error('Failed to parse message:', e);
            }
        };

        // Add welcome message
        function addWelcomeMessage() {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'welcome-message';
            welcomeDiv.innerHTML = '<h2>Welcome to Aurora!</h2><p>I\'m your AI coding assistant. How can I help you today?</p>';
            chatContainer.appendChild(welcomeDiv);
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Focus input on load
        setTimeout(() => messageInput.focus(), 100);
    </script>
</body>
</html>
