<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #ffffff;
            color: #3c3f41;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 12px 16px;
            border-bottom: 1px solid #dfe1e5;
            background-color: #ffffff;
        }

        .header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #3c3f41;
        }

        /* Chat messages area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background-color: #ffffff;
        }

        .message {
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .message-header {
            font-size: 12px;
            font-weight: 600;
            color: #7a7d80;
            margin-bottom: 4px;
        }

        .message-content {
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user .message-header {
            color: #64b5f6;
        }

        .message.assistant .message-header {
            color: #3c3f41;
        }

        /* Input area */
        .input-container {
            padding: 12px 16px;
            border-top: 1px solid #dfe1e5;
            background-color: #ffffff;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            background-color: #f6f7f8;
            color: #3c3f41;
            font-size: 13px;
            font-family: inherit;
            outline: none;
        }

        #messageInput:focus {
            background-color: #ffffff;
            box-shadow: 0 0 0 2px rgba(0, 150, 255, 0.2);
        }

        #sendButton {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background-color: #0096ff;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        #sendButton:hover {
            background-color: #007acc;
        }

        #sendButton:disabled {
            background-color: #b0b3b6;
            cursor: not-allowed;
        }

        /* Status bar */
        .status-bar {
            padding: 4px 16px;
            font-size: 11px;
            color: #7a7d80;
            background-color: #ffffff;
            border-top: 1px solid #f0f1f2;
        }

        /* Scrollbar styling */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background-color: #dfe1e5;
            border-radius: 3px;
        }

        /* Welcome message */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #7a7d80;
        }

        .welcome-message h2 {
            font-size: 16px;
            margin-bottom: 8px;
            color: #3c3f41;
        }

        .welcome-message p {
            font-size: 13px;
        }

        /* Streaming cursor */
        .streaming-cursor::after {
            content: '▋';
            animation: blink 1s infinite;
            color: #0096ff;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Aurora AI Assistant</h1>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome-message">
            <h2>Welcome to Aurora!</h2>
            <p>I'm your AI coding assistant. How can I help you today?</p>
        </div>
    </div>

    <div class="input-container">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Ask Aurora anything..." autocomplete="off">
            <button id="sendButton">Send</button>
        </div>
    </div>

    <div class="status-bar" id="statusBar">Ready</div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const statusBar = document.getElementById('statusBar');

        let isProcessing = false;

        // Send message to Java backend via JCEF bridge
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;

            // Add user message to chat UI immediately
            addMessage('user', text);

            // Clear input
            messageInput.value = '';

            // Send to Java backend via JCEF bridge
            window.Aurora.postMessage(JSON.stringify({
                type: 'message',
                content: text
            }));
        }

        // Add message to chat UI
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const headerDiv = document.createElement('div');
            headerDiv.className = 'message-header';
            headerDiv.textContent = role === 'user' ? '> You' : 'Aurora';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;

            messageDiv.appendChild(headerDiv);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Add streaming message placeholder
        function addStreamingMessage() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'streaming-message';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'message-header';
            headerDiv.textContent = 'Aurora';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content streaming-cursor';
            contentDiv.id = 'streaming-content';

            messageDiv.appendChild(headerDiv);
            messageDiv.appendChild(contentDiv);
            chatContainer.appendChild(messageDiv);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Update streaming message content
        function updateStreamingContent(content) {
            const contentDiv = document.getElementById('streaming-content');
            if (contentDiv) {
                contentDiv.textContent = content;
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        // Remove streaming cursor from message
        function removeStreamingCursor() {
            const contentDiv = document.getElementById('streaming-content');
            if (contentDiv) {
                contentDiv.classList.remove('streaming-cursor');
            }
        }

        // Handle messages from Java backend via Aurora bridge callback
        window.Aurora.onMessage = function(jsonStr) {
            try {
                const data = JSON.parse(jsonStr);

                switch (data.type) {
                    case 'response':
                        addMessage('assistant', data.content);
                        isProcessing = false;
                        sendButton.disabled = false;
                        statusBar.textContent = 'Ready';
                        messageInput.focus();
                        break;

                    case 'error':
                        addMessage('assistant', 'Error: ' + data.message);
                        isProcessing = false;
                        sendButton.disabled = false;
                        statusBar.textContent = 'Ready';
                        messageInput.focus();
                        break;

                    case 'status':
                        statusBar.textContent = data.content;
                        if (data.content.includes('thinking')) {
                            isProcessing = true;
                            sendButton.disabled = true;
                            addStreamingMessage();
                        } else {
                            isProcessing = false;
                            sendButton.disabled = false;
                            removeStreamingCursor();
                        }
                        break;

                    case 'clear':
                        chatContainer.innerHTML = '';
                        addWelcomeMessage();
                        messageInput.focus();
                        break;
                }
            } catch (e) {
                console.error('Failed to parse message:', e);
            }
        };

        // Add welcome message
        function addWelcomeMessage() {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'welcome-message';
            welcomeDiv.innerHTML = '<h2>Welcome to Aurora!</h2><p>I\'m your AI coding assistant. How can I help you today?</p>';
            chatContainer.appendChild(welcomeDiv);
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Focus input on load
        setTimeout(() => messageInput.focus(), 100);
    </script>
</body>
</html>
